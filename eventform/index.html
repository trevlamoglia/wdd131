<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Ticket</title>
  <link rel="icon" href="images/favicon.ico">
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <main class="wrapper">
    <h1>Event Ticket</h1>

    <form id="eventForm">
      <div class="field">
        <label for="firstName">First Name</label>
        <input id="firstName" name="firstName" type="text" required />
      </div>

      <div class="field">
        <label for="lastName">Last Name</label>
        <input id="lastName" name="lastName" type="text" required />
      </div>

      <div class="field full">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />
      </div>

      <div class="field">
        <label for="type">Type</label>
        <select
          id="type"
          name="type"
          aria-controls="studentID accessCode"
          required
        >
          <option value="">Choose one</option>
          <option value="student">Student</option>
          <option value="guest">Guest</option>
        </select>
      </div>

      <div class="field">
        <label for="availableDate">Event Date</label>
        <input id="availableDate" name="availableDate" type="date" required />
      </div>

      <div id="studentID" class="field full" hidden>
        <label for="studentNumber">Student I#</label>
          <input id="studentNumber" name="studentNumber" type="text" inputmode="numeric" maxlength="9" pattern="\d{9}" />
      </div>

      <div id="accessCode" class="field full" hidden>
        <label for="accessCodeInput">Access Code</label>
          <input id="accessCodeInput" name="accessCode" type="text" maxlength="8" />
      </div>


      <button class="full" type="submit">Create Ticket</button>
    </form>

    <section id="output" aria-live="polite"></section>
  </main>
</body>
</html>
