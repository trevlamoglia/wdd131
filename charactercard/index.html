<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Character Card">
    <meta property="og:description" content="A simple character card with attack and level up functionality.">
    <meta property="og:url" content="https://trevlamoglia.github.io/wdd131/character/index.html">
    <meta property="og:image" content="https://trevlamoglia.github.io/wdd131/charactercard/images/snortleblat.webp">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Character Card">
    <meta name="twitter:description" content="A simple character card with attack and level up functionality.">
    <meta name="twitter:image" content="https://trevlamoglia.github.io/wdd131/charactercard/images/snortleblat.webp">

    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="images/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple character card with attack and level up functionality.">
    <title>Character Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <article class="card">
            <img id="image" class="image" src="#" alt="Character Image">
            <h1 id="name" class="name"></h1>
            <div class="stats">
                <p id="class" class="class"></p>
                <p id="level" class="level"></p>
                <p id="health" class="health"></p>
            </div>
            <div class="buttons">
                <button id="attackBtn" type="button">Attacked</button>
                <button id="levelBtn" type="button">Level Up</button>
            </div>
        </article>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
